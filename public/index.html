<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL 단축기</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f4f5f7;
    margin: 0;
    display: flex;
    justify-content: center;
    padding: 60px 20px;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 32px;
    width: 100%;
    max-width: 480px;
  }
  h1 { margin: 0 0 8px; font-size: 22px; }
  p.sub { color: #666; margin: 0 0 24px; font-size: 14px; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #333; }
  input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 16px;
  }
  input::placeholder { color: #d8d8d8; }
  button {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #1d4ed8; }
  button:disabled { background: #93c5fd; cursor: not-allowed; }
  .result {
    margin-top: 20px;
    padding: 14px;
    border-radius: 8px;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    display: none;
  }
  .result.error {
    background: #fef2f2;
    border-color: #fecaca;
  }
  .result a { color: #2563eb; font-weight: 600; word-break: break-all; }
  .copy-btn {
    margin-top: 8px;
    width: auto;
    padding: 6px 12px;
    font-size: 12px;
    background: #444;
  }
  .copy-btn:hover { background: #222; }
</style>
</head>
<body>
  <div class="card">
    <h1>🔗 URL 단축기</h1>
    <p class="sub">긴 URL을 짧은 링크로 변환하세요.</p>

    <label for="url">원본 URL</label>
    <input id="url" type="text" placeholder="https://example.com/very/long/path" />

    <label for="customCode">커스텀 코드 (선택)</label>
    <input id="customCode" type="text" placeholder="my-link" />

    <button id="submitBtn">단축하기</button>

    <div class="result" id="result"></div>
  </div>

<script>
  const submitBtn = document.getElementById('submitBtn');
  const resultBox = document.getElementById('result');

  async function shorten() {
    const url = document.getElementById('url').value.trim();
    const customCode = document.getElementById('customCode').value.trim();

    resultBox.style.display = 'none';
    resultBox.className = 'result';

    if (!url) {
      resultBox.textContent = 'URL을 입력해주세요.';
      resultBox.className = 'result error';
      resultBox.style.display = 'block';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = '처리 중...';

    try {
      const res = await fetch('/api/shorten', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, customCode })
      });
      const data = await res.json();

      if (!res.ok) {
        resultBox.textContent = data.error || '오류가 발생했습니다.';
        resultBox.className = 'result error';
      } else {
        resultBox.innerHTML = `단축 URL: <a href="${data.shortUrl}" target="_blank">${data.shortUrl}</a><br>` +
          `<button class="copy-btn" onclick="navigator.clipboard.writeText('${data.shortUrl}')">복사</button>`;
      }
      resultBox.style.display = 'block';
    } catch (e) {
      resultBox.textContent = '네트워크 오류가 발생했습니다.';
      resultBox.className = 'result error';
      resultBox.style.display = 'block';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '단축하기';
    }
  }

  submitBtn.addEventListener('click', shorten);
  document.getElementById('url').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') shorten();
  });
</script>
</body>
</html>
